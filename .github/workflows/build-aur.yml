name: Build AUR Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main branch
        shell: bash
        run: |
          git fetch origin main
          TAG_COMMIT="${GITHUB_SHA}"
          MAIN_HEAD="$(git rev-parse origin/main)"
          if ! git merge-base --is-ancestor "$TAG_COMMIT" "$MAIN_HEAD"; then
            echo "::error::Tag ${GITHUB_REF_NAME} is not on the main branch. Aborting."
            exit 1
          fi
          echo "Tag ${GITHUB_REF_NAME} is on main branch, proceeding."

      - name: Validate tag format
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\.dev)?$ ]]; then
            echo "::error::Invalid tag format '${GITHUB_REF_NAME}'. Allowed formats: vx.y.z or vx.y.z.dev (e.g., v1.2.3, v1.0.0.dev)"
            exit 1
          fi
          echo "Tag format is valid: ${GITHUB_REF_NAME}"

      - name: Set version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Install build dependencies
        shell: bash
        run: |
          pacman -Syu --noconfirm --needed base-devel git sudo

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        shell: bash
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Install Python dependencies
        shell: bash
        run: |
          cd backend
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable with PyInstaller
        shell: bash
        run: |
          cd backend
          source venv/bin/activate
          pyinstaller --clean --noconfirm mebtty.spec
          chmod +x dist/mebtty

      - name: Create build user
        shell: bash
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder /home/builder

      - name: Build AUR package
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PKG_DIR="/home/builder/aur-build"
          mkdir -p "$PKG_DIR"

          # Copy and substitute PKGBUILD
          sed "s/\${VERSION}/$VERSION/g" pkg/aur/PKGBUILD > "$PKG_DIR/PKGBUILD"
          cp pkg/aur/mebtty.install "$PKG_DIR/mebtty.install"

          # Copy executable (since we built it locally, use it instead of downloading)
          cp backend/dist/mebtty "$PKG_DIR/mebtty-${VERSION}-linux-amd64"
          chmod +x "$PKG_DIR/mebtty-${VERSION}-linux-amd64"

          # Copy service file
          cp mebtty.service "$PKG_DIR/mebtty.service"

          # Update source to use local files
          cat > "$PKG_DIR/PKGBUILD" <<EOF
          # Maintainer: MebTTY Contributors
          # This PKGBUILD is auto-generated by CI.

          pkgname=mebtty
          pkgver=$VERSION
          pkgrel=1
          pkgdesc="A self-hosted web terminal that runs in your browser"
          arch=('x86_64')
          url="https://github.com/anthropics/mebtty"
          license=('MIT')
          depends=('glibc' 'gcc-libs')
          install=mebtty.install

          package() {
              install -Dm755 "\$srcdir/mebtty-${VERSION}-linux-amd64" "\$pkgdir/usr/bin/mebtty"
              install -Dm644 "\$srcdir/mebtty.service" "\$pkgdir/usr/lib/systemd/system/mebtty.service"
          }
          EOF

          chown -R builder:builder "$PKG_DIR"
          cd "$PKG_DIR"

          # Build as non-root user
          sudo -u builder makepkg -f --noconfirm

      - name: Collect package
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cp /home/builder/aur-build/mebtty-${VERSION}-*.pkg.tar.zst ./
          ls -lh *.pkg.tar.zst

      - name: Generate PKGBUILD for release
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed "s/\${VERSION}/$VERSION/g" pkg/aur/PKGBUILD > "PKGBUILD-${VERSION}"
          cp pkg/aur/mebtty.install "mebtty.install-${VERSION}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mebtty-aur-${{ steps.version.outputs.version }}
          path: |
            *.pkg.tar.zst
            PKGBUILD-*
            mebtty.install-*
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.pkg.tar.zst
            PKGBUILD-*
            mebtty.install-*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
