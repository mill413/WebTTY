name: Build Executable

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main branch
        run: |
          git fetch origin master
          TAG_COMMIT="${GITHUB_SHA}"
          MAIN_HEAD="$(git rev-parse origin/master)"
          if ! git merge-base --is-ancestor "$TAG_COMMIT" "$MAIN_HEAD"; then
            echo "::error::Tag ${GITHUB_REF_NAME} is not on the master branch. Aborting."
            exit 1
          fi
          echo "Tag ${GITHUB_REF_NAME} is on master branch, proceeding."

      - name: Validate tag format
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\.dev)?$ ]]; then
            echo "::error::Invalid tag format '${GITHUB_REF_NAME}'. Allowed formats: vx.y.z or vx.y.z.dev (e.g., v1.2.3, v1.0.0.dev)"
            exit 1
          fi
          echo "Tag format is valid: ${GITHUB_REF_NAME}"

      - name: Set version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install Python dependencies
        run: |
          cd backend
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable with PyInstaller
        run: |
          cd backend
          source venv/bin/activate
          pyinstaller --clean --noconfirm mebtty.spec
          chmod +x dist/mebtty

      - name: Prepare release artifact
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cp backend/dist/mebtty "mebtty-${VERSION}-linux-amd64"
          chmod +x "mebtty-${VERSION}-linux-amd64"
          ls -lh "mebtty-${VERSION}-linux-amd64"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mebtty-${{ steps.version.outputs.version }}-linux-amd64
          path: mebtty-${{ steps.version.outputs.version }}-linux-amd64
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: mebtty-${{ steps.version.outputs.version }}-linux-amd64
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
